<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="280" viewBox="0 0 780 280" role="img" aria-label="From n-gram counts to embeddings">
  <rect width="780" height="280" fill="#f2f3f0"/>
  <text x="24" y="32" fill="#1a1c1a" font-family="Georgia, serif" font-size="18" font-weight="600">From count tables to distributed representations</text>

  <rect x="40" y="60" width="300" height="180" rx="8" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="56" y="90" fill="#0d7a6c" font-family="Georgia, serif" font-size="15" font-weight="600">n-gram</text>
  <text x="56" y="120" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">Count fixed-length discrete histories</text>
  <text x="56" y="148" fill="#4a4c48" font-family="Georgia, serif" font-size="12">• Combinatorial explosion</text>
  <text x="56" y="170" fill="#4a4c48" font-family="Georgia, serif" font-size="12">• Unseen n-grams get starved probability</text>
  <text x="56" y="192" fill="#4a4c48" font-family="Georgia, serif" font-size="12">• Hard to share knowledge across similar words</text>

  <path d="M360 150 H420" stroke="#0d7a6c" stroke-width="2"/>
  <polygon points="420,144 432,150 420,156" fill="#0d7a6c"/>

  <rect x="440" y="60" width="300" height="180" rx="8" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="456" y="90" fill="#0d7a6c" font-family="Georgia, serif" font-size="15" font-weight="600">Neural LM</text>
  <text x="456" y="120" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">Represent words as vectors (embeddings)</text>
  <text x="456" y="148" fill="#4a4c48" font-family="Georgia, serif" font-size="12">• Parameters shared across contexts</text>
  <text x="456" y="170" fill="#4a4c48" font-family="Georgia, serif" font-size="12">• Similar contexts can get close vectors</text>
  <text x="456" y="192" fill="#4a4c48" font-family="Georgia, serif" font-size="12">• History-length design still remains</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-label="Self-attention (scaled dot-product)">
  <rect width="720" height="260" fill="#f2f3f0"/>
  <text x="28" y="36" fill="#1a1c1a" font-family="Georgia, serif" font-size="18" font-weight="600">Self-attention (scaled dot-product)</text>
  <rect x="50" y="80" width="90" height="56" rx="6" fill="#fff" stroke="#0d7a6c" stroke-width="2"/>
  <text x="78" y="115" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="22">Q</text>
  <rect x="180" y="80" width="90" height="56" rx="6" fill="#fff" stroke="#393b38" stroke-width="2"/>
  <text x="208" y="115" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="22">K</text>
  <rect x="310" y="80" width="90" height="56" rx="6" fill="#fff" stroke="#393b38" stroke-width="2"/>
  <text x="338" y="115" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="22">V</text>
  <text x="50" y="175" fill="#4a4c48" font-family="Georgia, serif" font-size="14">Similarity Q·K → softmax weights → weighted sum of V</text>
  <rect x="50" y="195" width="620" height="40" rx="6" fill="#fff" stroke="#393b38" stroke-width="2"/>
  <text x="70" y="221" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="15">Attention(Q,K,V)=softmax(QKᵀ/√dₖ)V</text>
</svg>

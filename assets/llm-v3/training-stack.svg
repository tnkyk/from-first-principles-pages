<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="300" viewBox="0 0 720 300" role="img" aria-label="Post-training stack (SFT→RM→RL)">
  <rect width="720" height="300" fill="#f2f3f0"/>
  <text x="28" y="36" fill="#1a1c1a" font-family="Georgia, serif" font-size="18" font-weight="600">Post-training stack (SFT→RM→RL)</text>
  <rect x="80" y="210" width="560" height="50" rx="6" fill="#fff" stroke="#393b38" stroke-width="2"/>
  <text x="100" y="242" fill="#1a1c1a" font-family="Georgia, serif" font-size="16">① Pretraining — next-token prediction (broad corpus)</text>
  <rect x="80" y="145" width="560" height="50" rx="6" fill="#fff" stroke="#0d7a6c" stroke-width="2"/>
  <text x="100" y="177" fill="#0d7a6c" font-family="Georgia, serif" font-size="16">② SFT — demos shift the model toward instruction following</text>
  <rect x="80" y="80" width="560" height="50" rx="6" fill="#fff" stroke="#0d7a6c" stroke-width="2"/>
  <text x="100" y="112" fill="#0d7a6c" font-family="Georgia, serif" font-size="16">③ RM → RL — further update the policy from human preference</text>
  <text x="80" y="285" fill="#4a4c48" font-family="Georgia, serif" font-size="13">Teaching schematic · Ouyang et al., 2022 InstructGPT three-stage pipeline</text>
</svg>

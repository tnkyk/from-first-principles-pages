<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="700" viewBox="0 0 860 700" role="img" aria-label="Two maps overview: genealogy and composition with DAG note">
  <rect width="860" height="700" fill="#f2f3f0"/>
  <text x="24" y="30" fill="#1a1c1a" font-family="Georgia, serif" font-size="20" font-weight="600">LLM techniques - two maps + tags</text>
  <text x="24" y="52" fill="#4a4c48" font-family="Georgia, serif" font-size="13">Called trees for teaching. Research history recombines - closer to a DAG. Tags allow multi-axis.</text>

  <rect x="24" y="70" width="812" height="260" rx="10" fill="#fff" stroke="#0d7a6c" stroke-width="2"/>
  <text x="44" y="98" fill="#0d7a6c" font-family="Georgia, serif" font-size="15" font-weight="600">Map 1 - Technology history / research lineage (time)</text>

  <g font-family="Georgia, serif" font-size="11" fill="#1a1c1a">
    <rect x="44" y="120" width="70" height="28" rx="4" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="54" y="138">n-gram</text>
    <text x="118" y="138" fill="#0d7a6c">&gt;</text>
    <rect x="134" y="120" width="58" height="28" rx="4" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="144" y="138">NNLM</text>
    <text x="196" y="138" fill="#0d7a6c">&gt;</text>
    <rect x="212" y="120" width="50" height="28" rx="4" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="222" y="138">RNN</text>
    <text x="266" y="138" fill="#0d7a6c">&gt;</text>
    <rect x="282" y="120" width="54" height="28" rx="4" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="292" y="138">LSTM</text>
    <text x="340" y="138" fill="#0d7a6c">&gt;</text>
    <rect x="356" y="120" width="70" height="28" rx="4" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="364" y="138">Seq2Seq</text>
    <text x="430" y="138" fill="#0d7a6c">&gt;</text>
    <rect x="446" y="120" width="70" height="28" rx="4" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="454" y="138">Attention</text>
    <text x="520" y="138" fill="#0d7a6c">&gt;</text>
    <rect x="536" y="116" width="110" height="36" rx="6" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
    <text x="548" y="138" fill="#0d7a6c" font-size="12" font-weight="600">Transformer</text>
  </g>

  <path d="M591 152 V170" stroke="#0d7a6c" stroke-width="2"/>
  <path d="M80 170 H780" stroke="#0d7a6c" stroke-width="2"/>

  <g font-family="Georgia, serif" font-size="11">
    <rect x="70" y="180" width="130" height="48" rx="5" fill="#f2f3f0" stroke="#0d7a6c"/>
    <text x="82" y="200" fill="#0d7a6c" font-weight="600">Scale</text>
    <text x="82" y="218" fill="#1a1c1a">Dense / MoE</text>
    <rect x="220" y="180" width="130" height="48" rx="5" fill="#f2f3f0" stroke="#0d7a6c"/>
    <text x="232" y="200" fill="#0d7a6c" font-weight="600">Long context</text>
    <text x="232" y="218" fill="#1a1c1a">RoPE / YaRN</text>
    <rect x="370" y="180" width="130" height="48" rx="5" fill="#f2f3f0" stroke="#0d7a6c"/>
    <text x="382" y="200" fill="#0d7a6c" font-weight="600">Faster serve</text>
    <text x="382" y="218" fill="#1a1c1a">Flash / KV</text>
    <rect x="520" y="180" width="130" height="48" rx="5" fill="#f2f3f0" stroke="#0d7a6c"/>
    <text x="532" y="200" fill="#0d7a6c" font-weight="600">Reason / align</text>
    <text x="532" y="218" fill="#1a1c1a">CoT / RLVR</text>
    <rect x="670" y="180" width="130" height="48" rx="5" fill="#f2f3f0" stroke="#393b38"/>
    <text x="682" y="200" fill="#1a1c1a" font-weight="600">Replace</text>
    <text x="682" y="218" fill="#1a1c1a">Mamba / Diff.</text>
  </g>
  <text x="44" y="258" fill="#a85a2a" font-family="Georgia, serif" font-size="12" font-weight="600">Not Map-1 children: RAG / Tool / MCP / Agent -&gt; Map 2 layer 6</text>
  <text x="44" y="282" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Recombination example: Jamba = Mamba + Attention + MoE (multiple parents).</text>
  <text x="44" y="306" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Edges mean: solved prior bottleneck / same research pressure  not exclusive parenthood.</text>

  <path d="M430 330 V358" stroke="#393b38" stroke-width="2"/>
  <polygon points="430,358 424,348 436,348" fill="#393b38"/>
  <text x="448" y="350" fill="#4a4c48" font-family="Georgia, serif" font-size="12">uses / is wrapped by</text>

  <rect x="24" y="368" width="812" height="280" rx="10" fill="#fff" stroke="#a85a2a" stroke-width="2"/>
  <text x="44" y="396" fill="#a85a2a" font-family="Georgia, serif" font-size="15" font-weight="600">Map 2 - System composition (8 layers, not time)</text>

  <g font-family="Georgia, serif" font-size="11">
    <rect x="40" y="416" width="90" height="70" rx="5" fill="#fff8f0" stroke="#a85a2a"/>
    <text x="50" y="444" fill="#a85a2a" font-weight="600">1 Data</text>
    <text x="50" y="464" fill="#1a1c1a">experience</text>
    <rect x="140" y="416" width="90" height="70" rx="5" fill="#f2f3f0" stroke="#393b38"/>
    <text x="150" y="444" fill="#0d7a6c" font-weight="600">2 Learn</text>
    <text x="150" y="464" fill="#1a1c1a">objectives</text>
    <rect x="240" y="416" width="90" height="70" rx="5" fill="#f2f3f0" stroke="#393b38"/>
    <text x="250" y="444" fill="#0d7a6c" font-weight="600">3 Model</text>
    <text x="250" y="464" fill="#1a1c1a">structure</text>
    <rect x="340" y="416" width="90" height="70" rx="5" fill="#f2f3f0" stroke="#393b38"/>
    <text x="350" y="444" fill="#0d7a6c" font-weight="600">4 Infer</text>
    <text x="350" y="464" fill="#1a1c1a">search</text>
    <rect x="440" y="416" width="90" height="70" rx="5" fill="#f2f3f0" stroke="#393b38"/>
    <text x="450" y="444" fill="#0d7a6c" font-weight="600">5 Serve</text>
    <text x="450" y="464" fill="#1a1c1a">accel.</text>
    <rect x="540" y="416" width="90" height="70" rx="5" fill="#fff8f0" stroke="#a85a2a"/>
    <text x="550" y="444" fill="#a85a2a" font-weight="600">6 Ext.</text>
    <text x="550" y="464" fill="#1a1c1a">Agent</text>
    <rect x="640" y="416" width="90" height="70" rx="5" fill="#fff8f0" stroke="#a85a2a"/>
    <text x="650" y="444" fill="#a85a2a" font-weight="600">7 Eval</text>
    <text x="650" y="464" fill="#1a1c1a">assure</text>
    <rect x="740" y="416" width="80" height="70" rx="5" fill="#f2f3f0" stroke="#393b38"/>
    <text x="750" y="444" fill="#0d7a6c" font-weight="600">8 UI</text>
    <text x="750" y="464" fill="#1a1c1a">liability</text>
  </g>

  <text x="44" y="520" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">Tags (always): genealogy · layer · motive. One name can score on several axes.</text>
  <text x="44" y="548" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Agent lives in layer 6. Evaluation (layer 7) is how claims are checked  distinct from UI liability (8).</text>
  <text x="44" y="576" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Budget question across maps: is improvement from pretrain, post-train, or test-time compute?</text>
  <text x="44" y="610" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Source: educational schematic synthesizing Parts I-V (v3.4).</text>
  <text x="44" y="640" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Pick Map 1 for history pressure, Map 2 for product debugging, tags when names recombine.</text>
</svg>

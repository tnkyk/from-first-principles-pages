<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="480" viewBox="0 0 860 480" role="img" aria-label="System composition tree  not a timeline">
  <rect width="860" height="480" fill="#f2f3f0"/>
  <text x="24" y="32" fill="#1a1c1a" font-family="Georgia, serif" font-size="20" font-weight="600">Tree 2  System composition (dependency, not time)</text>
  <text x="24" y="54" fill="#4a4c48" font-family="Georgia, serif" font-size="13">How a product is stacked. Agent is under External systems  not a child of Transformer.</text>

  <rect x="300" y="78" width="260" height="48" rx="8" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="350" y="108" fill="#0d7a6c" font-family="Georgia, serif" font-size="16" font-weight="600">LLM system</text>
  <path d="M430 126 V150" stroke="#0d7a6c" stroke-width="2"/>
  <path d="M90 150 H770" stroke="#0d7a6c" stroke-width="2"/>

  <g font-family="Georgia, serif" font-size="12">
    <path d="M120 150 V168" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="50" y="168" width="140" height="88" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="64" y="194" fill="#0d7a6c" font-weight="600">Model</text>
    <text x="64" y="216" fill="#1a1c1a">Dense / MoE</text>
    <text x="64" y="236" fill="#4a4c48" font-size="11">Transformer spine</text>

    <path d="M260 150 V168" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="190" y="168" width="140" height="88" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="204" y="194" fill="#0d7a6c" font-weight="600">Learning</text>
    <text x="204" y="216" fill="#1a1c1a">Pretrain · SFT</text>
    <text x="204" y="236" fill="#1a1c1a">RLHF · DPO · RLVR</text>

    <path d="M400 150 V168" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="330" y="168" width="140" height="88" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="344" y="194" fill="#0d7a6c" font-weight="600">Inference</text>
    <text x="344" y="216" fill="#1a1c1a">Sampling · CoT</text>
    <text x="344" y="236" fill="#1a1c1a">TTC · reasoning</text>

    <path d="M540 150 V168" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="470" y="168" width="140" height="88" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="484" y="194" fill="#0d7a6c" font-weight="600">Acceleration</text>
    <text x="484" y="216" fill="#1a1c1a">KV · FlashAttn</text>
    <text x="484" y="236" fill="#1a1c1a">Spec · Quant</text>

    <path d="M680 150 V168" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="610" y="168" width="200" height="88" rx="6" fill="#fff" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="624" y="194" fill="#a85a2a" font-weight="600">External systems</text>
    <text x="624" y="216" fill="#1a1c1a">RAG · Tool · MCP</text>
    <text x="624" y="236" fill="#1a1c1a">Memory · Agent</text>
  </g>

  <!-- zoom external -->
  <path d="M710 256 V280" stroke="#a85a2a" stroke-width="2"/>
  <rect x="50" y="280" width="760" height="140" rx="8" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
  <text x="70" y="310" fill="#a85a2a" font-family="Georgia, serif" font-size="14" font-weight="600">External / application layer (uses the model)</text>
  <g font-family="Georgia, serif" font-size="13">
    <rect x="70" y="330" width="120" height="60" rx="6" fill="#fff" stroke="#a85a2a"/>
    <text x="100" y="365" fill="#1a1c1a">RAG</text>
    <rect x="210" y="330" width="120" height="60" rx="6" fill="#fff" stroke="#a85a2a"/>
    <text x="240" y="365" fill="#1a1c1a">Tool</text>
    <rect x="350" y="330" width="120" height="60" rx="6" fill="#fff" stroke="#a85a2a"/>
    <text x="385" y="365" fill="#1a1c1a">MCP</text>
    <rect x="490" y="330" width="120" height="60" rx="6" fill="#fff" stroke="#a85a2a"/>
    <text x="515" y="365" fill="#1a1c1a">Memory</text>
    <rect x="630" y="330" width="150" height="60" rx="6" fill="#fff" stroke="#a85a2a" stroke-width="2"/>
    <text x="670" y="365" fill="#a85a2a" font-weight="600">Agent</text>
  </g>

  <text x="24" y="460" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Composition question: which layer fails? Genealogy question: which invention pressure? Do not merge the two trees.</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640" role="img" aria-label="LLM システム八層の概観">
  <rect width="820" height="640" fill="#f2f3f0"/>
  <text x="24" y="34" fill="#1a1c1a" font-family="Georgia, serif" font-size="20" font-weight="600">地図② — システム層（構成・八層）</text>
  <text x="24" y="58" fill="#4a4c48" font-family="Georgia, serif" font-size="13">年表ではない。データ／経験と評価／保証を含む。</text>

  <rect x="40" y="80" width="200" height="500" rx="10" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="70" y="140" fill="#0d7a6c" font-family="Georgia, serif" font-size="28" font-weight="600">LLM</text>
  <text x="56" y="180" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">一つの製品面</text>
  <text x="56" y="205" fill="#4a4c48" font-family="Georgia, serif" font-size="12">積み上げ八層</text>
  <text x="56" y="250" fill="#4a4c48" font-family="Georgia, serif" font-size="12">木は教育上の近似</text>
  <text x="56" y="268" fill="#4a4c48" font-family="Georgia, serif" font-size="12">タグで多軸が可能</text>

  <g font-family="Georgia, serif" font-size="13">
    <rect x="280" y="80" width="500" height="52" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="296" y="102" fill="#a85a2a" font-weight="600">1 データ／経験</text>
    <text x="296" y="122" fill="#4a4c48" font-size="12">Web／コード／数学／合成／蒸留／選好／ツール軌跡</text>

    <rect x="280" y="142" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="164" fill="#0d7a6c" font-weight="600">2 学習目的／事後学習</text>
    <text x="296" y="184" fill="#4a4c48" font-size="12">事前学習／SFT／RLHF／DPO／RLVR／継続事前学習</text>

    <rect x="280" y="204" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="226" fill="#0d7a6c" font-weight="600">3 モデル構造</text>
    <text x="296" y="246" fill="#4a4c48" font-size="12">Dense／MoE／GQA／MLA／位置／マルチモーダル</text>

    <rect x="280" y="266" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="288" fill="#0d7a6c" font-weight="600">4 推論／探索</text>
    <text x="296" y="308" fill="#4a4c48" font-size="12">サンプリング／CoT／テスト時計算／軌跡の探索</text>

    <rect x="280" y="328" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="350" fill="#0d7a6c" font-weight="600">5 配信／加速</text>
    <text x="296" y="370" fill="#4a4c48" font-size="12">KV／FlashAttention／投機／量子化／ページング</text>

    <rect x="280" y="390" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="412" fill="#0d7a6c" font-weight="600">6 外部知識／ツール／Agent</text>
    <text x="296" y="432" fill="#4a4c48" font-size="12">RAG／ツール／MCP／メモリ／オーケストレーション</text>

    <rect x="280" y="452" width="500" height="52" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="296" y="474" fill="#a85a2a" font-weight="600">7 評価／保証</text>
    <text x="296" y="494" fill="#4a4c48" font-size="12">ベンチ／汚染検査／人評価／モニタリング</text>

    <rect x="280" y="514" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="536" fill="#0d7a6c" font-weight="600">8 UI／制度／責任</text>
    <text x="296" y="556" fill="#4a4c48" font-size="12">製品UX／権限／監査／法的責任</text>
  </g>

  <text x="40" y="620" fill="#4a4c48" font-family="Georgia, serif" font-size="12">例: RLVR は層1-2-4-7に跨る。RAG は第6層であり、地図①の Transformer 子ではない。</text>
</svg>

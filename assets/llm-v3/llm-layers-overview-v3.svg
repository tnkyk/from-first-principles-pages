<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="640" viewBox="0 0 820 640" role="img" aria-label="LLM system eight layers overview">
  <rect width="820" height="640" fill="#f2f3f0"/>
  <text x="24" y="34" fill="#1a1c1a" font-family="Georgia, serif" font-size="20" font-weight="600">Map 2 - System layers (composition, 8 layers)</text>
  <text x="24" y="58" fill="#4a4c48" font-family="Georgia, serif" font-size="13">Not a timeline. Includes data/experience and evaluation/assurance.</text>

  <rect x="40" y="80" width="200" height="500" rx="10" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="70" y="140" fill="#0d7a6c" font-family="Georgia, serif" font-size="28" font-weight="600">LLM</text>
  <text x="56" y="180" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">one product surface</text>
  <text x="56" y="205" fill="#4a4c48" font-family="Georgia, serif" font-size="12">eight stacked layers</text>
  <text x="56" y="250" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Trees are a teaching</text>
  <text x="56" y="268" fill="#4a4c48" font-family="Georgia, serif" font-size="12">approximation; tags</text>
  <text x="56" y="286" fill="#4a4c48" font-family="Georgia, serif" font-size="12">allow multi-axis.</text>

  <g font-family="Georgia, serif" font-size="13">
    <rect x="280" y="80" width="500" height="52" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="296" y="102" fill="#a85a2a" font-weight="600">1 Data / experience</text>
    <text x="296" y="122" fill="#4a4c48" font-size="12">web / code / math / synthetic / distill / prefs / tool traces</text>

    <rect x="280" y="142" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="164" fill="#0d7a6c" font-weight="600">2 Learning objectives / post-training</text>
    <text x="296" y="184" fill="#4a4c48" font-size="12">pretrain / SFT / RLHF / DPO / RLVR / continued pretrain</text>

    <rect x="280" y="204" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="226" fill="#0d7a6c" font-weight="600">3 Model structure</text>
    <text x="296" y="246" fill="#4a4c48" font-size="12">Dense / MoE / GQA / MLA / positions / multimodal encoders</text>

    <rect x="280" y="266" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="288" fill="#0d7a6c" font-weight="600">4 Inference / search</text>
    <text x="296" y="308" fill="#4a4c48" font-size="12">sampling / CoT / test-time compute / search over traces</text>

    <rect x="280" y="328" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="350" fill="#0d7a6c" font-weight="600">5 Serving / acceleration</text>
    <text x="296" y="370" fill="#4a4c48" font-size="12">KV / FlashAttention / speculative / quant / paging</text>

    <rect x="280" y="390" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="412" fill="#0d7a6c" font-weight="600">6 External knowledge / tools / Agent</text>
    <text x="296" y="432" fill="#4a4c48" font-size="12">RAG / tools / MCP / memory / orchestration</text>

    <rect x="280" y="452" width="500" height="52" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="296" y="474" fill="#a85a2a" font-weight="600">7 Evaluation / assurance</text>
    <text x="296" y="494" fill="#4a4c48" font-size="12">benchmarks / contamination checks / human eval / monitoring</text>

    <rect x="280" y="514" width="500" height="52" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="296" y="536" fill="#0d7a6c" font-weight="600">8 UI / institution / responsibility</text>
    <text x="296" y="556" fill="#4a4c48" font-size="12">product UX / permissions / audit / legal liability</text>
  </g>

  <text x="40" y="620" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Example: RLVR sits on layers 1-2-4-7 - not algorithm alone. RAG is layer 6, not Tree-1 child of Transformer.</text>
</svg>

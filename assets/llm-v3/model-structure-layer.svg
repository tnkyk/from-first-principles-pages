<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="820" height="280" viewBox="0 0 820 280" role="img" aria-label="Model structure layer under Transformer">
  <rect width="820" height="280" fill="#f2f3f0"/>
  <text x="24" y="34" fill="#1a1c1a" font-family="Georgia, serif" font-size="20" font-weight="600">Model structure layer (under Transformer)</text>
  <rect x="300" y="70" width="220" height="50" rx="8" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="345" y="102" fill="#0d7a6c" font-family="Georgia, serif" font-size="16" font-weight="600">Transformer</text>
  <path d="M410 120 v30" stroke="#393b38" stroke-width="2"/>
  <path d="M120 150 H700" stroke="#393b38" stroke-width="2"/>
  <g font-family="Georgia, serif" font-size="13">
    <rect x="40" y="170" width="130" height="70" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="70" y="210" fill="#1a1c1a">Dense</text>
    <rect x="190" y="170" width="130" height="70" rx="6" fill="#e8f7f4" stroke="#0d7a6c"/>
    <text x="230" y="210" fill="#0d7a6c" font-weight="600">MoE</text>
    <rect x="340" y="170" width="130" height="70" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="380" y="210" fill="#1a1c1a">MLA / GQA</text>
    <rect x="490" y="170" width="130" height="70" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="520" y="210" fill="#1a1c1a">RoPE / pos</text>
    <rect x="640" y="170" width="140" height="70" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="665" y="210" fill="#1a1c1a">Hybrid…</text>
  </g>
  <text x="40" y="265" fill="#4a4c48" font-family="Georgia, serif" font-size="12">These are options inside the structure layer — history did not become “Transformer then MoE then …” as successive eras.</text>
</svg>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="420" viewBox="0 0 780 420" role="img" aria-label="学習: RNN の逐次 vs Transformer の並列">
  <rect width="780" height="420" fill="#f2f3f0"/>
  <text x="24" y="32" fill="#1a1c1a" font-family="Georgia, serif" font-size="18" font-weight="600">学習の対比 — 並列化できるか？</text>

  <text x="24" y="68" fill="#0d7a6c" font-family="Georgia, serif" font-size="15" font-weight="600">RNN / LSTM</text>
  <text x="24" y="90" fill="#4a4c48" font-family="Georgia, serif" font-size="13">h2 は h1 を要する。時間ステップをまとめて並列化しにくい。</text>

  <rect x="40" y="120" width="56" height="40" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="52" y="145" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x1</text>
  <rect x="130" y="120" width="56" height="40" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="142" y="145" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x2</text>
  <rect x="220" y="120" width="56" height="40" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="232" y="145" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x3</text>
  <rect x="310" y="120" width="56" height="40" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="322" y="145" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x4</text>

  <path d="M68 160 v20" stroke="#393b38" stroke-width="1.5" fill="none"/>
  <path d="M158 160 v20" stroke="#393b38" stroke-width="1.5" fill="none"/>
  <path d="M248 160 v20" stroke="#393b38" stroke-width="1.5" fill="none"/>
  <path d="M338 160 v20" stroke="#393b38" stroke-width="1.5" fill="none"/>

  <rect x="40" y="180" width="56" height="40" rx="4" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="52" y="205" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="14">h1</text>
  <rect x="130" y="180" width="56" height="40" rx="4" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="142" y="205" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="14">h2</text>
  <rect x="220" y="180" width="56" height="40" rx="4" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="232" y="205" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="14">h3</text>
  <rect x="310" y="180" width="56" height="40" rx="4" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="322" y="205" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="14">h4</text>

  <path d="M96 200 H130" stroke="#0d7a6c" stroke-width="2"/>
  <path d="M186 200 H220" stroke="#0d7a6c" stroke-width="2"/>
  <path d="M276 200 H310" stroke="#0d7a6c" stroke-width="2"/>
  <text x="150" y="250" fill="#4a4c48" font-family="Georgia, serif" font-size="12">時間依存（待つ必要がある）</text>

  <text x="24" y="290" fill="#0d7a6c" font-family="Georgia, serif" font-size="15" font-weight="600">Transformer（一層内）</text>
  <text x="24" y="312" fill="#4a4c48" font-family="Georgia, serif" font-size="13">全位置が一層で相互作用；出力は並列に計算できる。</text>

  <rect x="40" y="340" width="56" height="36" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="52" y="363" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x1</text>
  <rect x="110" y="340" width="56" height="36" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="122" y="363" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x2</text>
  <rect x="180" y="340" width="56" height="36" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="192" y="363" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x3</text>
  <rect x="250" y="340" width="56" height="36" rx="4" fill="#fff" stroke="#393b38" stroke-width="1.5"/>
  <text x="262" y="363" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="14">x4</text>

  <rect x="360" y="330" width="160" height="56" rx="6" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="385" y="355" fill="#0d7a6c" font-family="Georgia, serif" font-size="14">Self-Attention</text>
  <text x="375" y="375" fill="#4a4c48" font-family="Georgia, serif" font-size="12">（層内で並列）</text>

  <path d="M306 358 H360" stroke="#393b38" stroke-width="1.5"/>
  <rect x="560" y="340" width="180" height="36" rx="4" fill="#fff" stroke="#0d7a6c" stroke-width="2"/>
  <text x="575" y="363" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="13">z1 z2 z3 z4</text>
  <path d="M520 358 H560" stroke="#0d7a6c" stroke-width="2"/>

  <text x="360" y="410" fill="#4a4c48" font-family="Georgia, serif" font-size="12">全対 Attention は系列長とともに計算／メモリが増える。</text>
</svg>

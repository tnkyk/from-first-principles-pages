<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="780" height="300" viewBox="0 0 780 300" role="img" aria-label="生成: 自己回帰の逐次性は残る">
  <rect width="780" height="300" fill="#f2f3f0"/>
  <text x="24" y="32" fill="#1a1c1a" font-family="Georgia, serif" font-size="18" font-weight="600">生成 — Transformer でも逐次性は残る</text>
  <text x="24" y="58" fill="#4a4c48" font-family="Georgia, serif" font-size="14">学習は位置を並列化；自己回帰デコードは各トークンを待つ。</text>

  <rect x="40" y="100" width="120" height="48" rx="6" fill="#fff" stroke="#393b38" stroke-width="2"/>
  <text x="52" y="130" fill="#1a1c1a" font-family="Georgia, serif" font-size="14">入力プレフィックス</text>

  <path d="M160 124 H200" stroke="#0d7a6c" stroke-width="2"/>
  <rect x="200" y="100" width="100" height="48" rx="6" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="225" y="130" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="16">y1</text>

  <path d="M300 124 H340" stroke="#0d7a6c" stroke-width="2"/>
  <rect x="340" y="90" width="160" height="68" rx="6" fill="#fff" stroke="#393b38" stroke-width="2"/>
  <text x="355" y="118" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">入力 + y1</text>
  <text x="355" y="140" fill="#4a4c48" font-family="Georgia, serif" font-size="12">条件付き再計算</text>

  <path d="M500 124 H540" stroke="#0d7a6c" stroke-width="2"/>
  <rect x="540" y="100" width="100" height="48" rx="6" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="565" y="130" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="16">y2</text>

  <path d="M640 124 H680" stroke="#0d7a6c" stroke-width="2"/>
  <rect x="680" y="100" width="70" height="48" rx="6" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="698" y="130" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="16">y3</text>

  <text x="40" y="200" fill="#1a1c1a" font-family="Georgia, serif" font-size="14" font-weight="600">要点の差</text>
  <text x="40" y="228" fill="#4a4c48" font-family="Georgia, serif" font-size="13">・学習: 全位置に教師トークン；因果マスク下で損失を並列計算できる。</text>
  <text x="40" y="252" fill="#4a4c48" font-family="Georgia, serif" font-size="13">・生成: 自分の出力が次入力になるため、y1→y2→y3 は本質的に逐次。</text>
  <text x="40" y="276" fill="#4a4c48" font-family="Georgia, serif" font-size="13">・KV Cache は再計算を減らすが、「次トークン待ち」は消せない。</text>
</svg>

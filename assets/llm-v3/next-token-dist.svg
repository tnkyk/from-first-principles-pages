  <text x="50" y="240" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="12">天気</text>
  <text x="110" y="240" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="12">首都</text>
  <text x="170" y="240" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="12">街</text>
  <text x="230" y="240" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="12">人</text>
  <text x="290" y="240" fill="#1a1c1a" font-family="IBM Plex Mono, monospace" font-size="12">…</text>
  <rect x="420" y="120" width="240" height="70" rx="6" fill="#fff" stroke="#0d7a6c" stroke-width="2"/>
  <text x="440" y="150" fill="#4a4c48" font-family="Georgia, serif" font-size="13">サンプル結果</text>
  <text x="440" y="175" fill="#0d7a6c" font-family="IBM Plex Mono, monospace" font-size="18">→ 「天気」</text>
  <text x="40" y="265" fill="#4a4c48" font-family="Georgia, serif" font-size="12">教育用模式図 · Brown et al., 2020 自己回帰設定</text>


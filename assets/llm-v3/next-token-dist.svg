  <text x="40" y="70" fill="#4a4c48" font-family="Georgia, serif" font-size="14">条件「東京の」→ 語彙上の確率 → 1トークン選択</text>
  <rect x="50" y="100" width="40" height="110" fill="#35d0bb" stroke="#0d7a6c" stroke-width="2"/>

<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-label="システム構成の木（八層）">
  <rect width="900" height="560" fill="#f2f3f0"/>
  <text x="24" y="32" fill="#1a1c1a" font-family="Georgia, serif" font-size="20" font-weight="600">地図② — システム構成（依存関係・時間ではない）</text>
  <text x="24" y="54" fill="#4a4c48" font-family="Georgia, serif" font-size="13">教育名は木。実態は再結合 DAG。技術は複数層に跨りうる。</text>

  <rect x="320" y="72" width="260" height="44" rx="8" fill="#e8f7f4" stroke="#0d7a6c" stroke-width="2"/>
  <text x="370" y="100" fill="#0d7a6c" font-family="Georgia, serif" font-size="16" font-weight="600">LLM システム</text>
  <path d="M450 116 V140" stroke="#0d7a6c" stroke-width="2"/>
  <path d="M60 140 H840" stroke="#0d7a6c" stroke-width="2"/>

  <g font-family="Georgia, serif" font-size="11">
    <path d="M100 140 V158" stroke="#a85a2a" stroke-width="2"/>
    <rect x="40" y="158" width="120" height="96" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="52" y="182" fill="#a85a2a" font-weight="600">1 データ</text>
    <text x="52" y="202" fill="#1a1c1a">Web／コード</text>
    <text x="52" y="220" fill="#1a1c1a">合成</text>
    <text x="52" y="238" fill="#1a1c1a">選好／軌跡</text>

    <path d="M220 140 V158" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="160" y="158" width="120" height="96" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="172" y="182" fill="#0d7a6c" font-weight="600">2 学習</text>
    <text x="172" y="202" fill="#1a1c1a">事前学習</text>
    <text x="172" y="220" fill="#1a1c1a">SFT / RLHF</text>
    <text x="172" y="238" fill="#1a1c1a">RLVR</text>

    <path d="M340 140 V158" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="280" y="158" width="120" height="96" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="292" y="182" fill="#0d7a6c" font-weight="600">3 構造</text>
    <text x="292" y="202" fill="#1a1c1a">Dense / MoE</text>
    <text x="292" y="220" fill="#1a1c1a">GQA / MLA</text>
    <text x="292" y="238" fill="#1a1c1a">マルチモーダル</text>

    <path d="M460 140 V158" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="400" y="158" width="120" height="96" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="412" y="182" fill="#0d7a6c" font-weight="600">4 推論</text>
    <text x="412" y="202" fill="#1a1c1a">サンプリング</text>
    <text x="412" y="220" fill="#1a1c1a">CoT / TTC</text>
    <text x="412" y="238" fill="#1a1c1a">探索</text>

    <path d="M580 140 V158" stroke="#0d7a6c" stroke-width="2"/>
    <rect x="520" y="158" width="120" height="96" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="532" y="182" fill="#0d7a6c" font-weight="600">5 配信</text>
    <text x="532" y="202" fill="#1a1c1a">KV / Flash</text>
    <text x="532" y="220" fill="#1a1c1a">spec / quant</text>
    <text x="532" y="238" fill="#1a1c1a">ページング</text>

    <path d="M700 140 V158" stroke="#a85a2a" stroke-width="2"/>
    <rect x="640" y="158" width="120" height="96" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="652" y="182" fill="#a85a2a" font-weight="600">6 外部</text>
    <text x="652" y="202" fill="#1a1c1a">RAG / Tool</text>
    <text x="652" y="220" fill="#1a1c1a">MCP / Mem</text>
    <text x="652" y="238" fill="#1a1c1a">Agent</text>

    <path d="M820 140 V158" stroke="#a85a2a" stroke-width="2"/>
    <rect x="760" y="158" width="120" height="96" rx="6" fill="#fff8f0" stroke="#a85a2a" stroke-width="1.5"/>
    <text x="772" y="182" fill="#a85a2a" font-weight="600">7 評価</text>
    <text x="772" y="202" fill="#1a1c1a">ベンチ</text>
    <text x="772" y="220" fill="#1a1c1a">汚染</text>
    <text x="772" y="238" fill="#1a1c1a">監視</text>
  </g>

  <path d="M450 254 V278" stroke="#393b38" stroke-width="2"/>
  <rect x="40" y="278" width="840" height="100" rx="8" fill="#fff" stroke="#393b38"/>
  <text x="60" y="310" fill="#0d7a6c" font-family="Georgia, serif" font-size="14" font-weight="600">8 UI／制度／責任</text>
  <text x="60" y="338" fill="#1a1c1a" font-family="Georgia, serif" font-size="13">チャットUX／権限／監査ログ／生成失敗時の責任</text>
  <text x="60" y="360" fill="#4a4c48" font-family="Georgia, serif" font-size="12">評価と分離: スコアは説明責任と同じではない。</text>

  <rect x="40" y="400" width="840" height="120" rx="8" fill="#fff" stroke="#0d7a6c"/>
  <text x="60" y="430" fill="#0d7a6c" font-family="Georgia, serif" font-size="14" font-weight="600">技術ごとの三タグ（一親ではない）</text>
  <g font-family="Georgia, serif" font-size="13" fill="#1a1c1a">
    <text x="60" y="458">系譜: 何を前提にしたか？</text>
    <text x="60" y="480">層: 製品のどこに座るか？</text>
    <text x="60" y="502">動機: どの制約を攻めたか？</text>
  </g>
  <text x="420" y="458" fill="#4a4c48" font-family="Georgia, serif" font-size="12">GQA 例: Transformer 系譜／</text>
  <text x="420" y="480" fill="#4a4c48" font-family="Georgia, serif" font-size="12">構造層／KVメモリ動機</text>
  <text x="420" y="502" fill="#4a4c48" font-family="Georgia, serif" font-size="12">Jamba: Mamba + Attention + MoE 再結合</text>

  <text x="24" y="545" fill="#4a4c48" font-family="Georgia, serif" font-size="12">出典: 教育用模式図。Agent は External 配下 — Transformer の子ではない。</text>
</svg>

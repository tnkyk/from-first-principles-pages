<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="260" viewBox="0 0 720 260" role="img" aria-label="reward ownership">
  <rect width="720" height="260" fill="#1e201e"/>
  <text x="24" y="36" fill="#f2f3f0" font-family="Georgia, serif" font-size="18" font-weight="600">行動は増えても、所有感は減りうる</text>
  <rect x="50" y="70" width="280" height="120" rx="4" fill="#151716" stroke="#35d0bb" stroke-width="2"/>
  <text x="80" y="110" fill="#35d0bb" font-family="Georgia, serif" font-size="15">随伴性のある能動</text>
  <text x="70" y="140" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">自分が原因だという感覚</text>
  <text x="70" y="162" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">内発の所有感が残りやすい</text>
  <rect x="390" y="70" width="280" height="120" rx="4" fill="#151716" stroke="#393b38" stroke-width="2"/>
  <text x="420" y="110" fill="#f2f3f0" font-family="Georgia, serif" font-size="15">期待された有形報酬</text>
  <text x="410" y="140" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">統制された感じが強まる</text>
  <text x="410" y="162" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">自由選択が減ることがある</text>
  <text x="24" y="230" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">教育用模式図 / Deci Koestner Ryan 1999</text>
</svg>

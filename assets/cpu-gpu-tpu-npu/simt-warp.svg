<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-label="SIMT warp の教育用模式図">
  <rect width="860" height="420" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">SIMT（教育用模式）</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">同じ命令を多数スレッドへ。分岐すると一部レーンがマスクされる。</text>
  <g font-family="Georgia, serif" font-size="12">
    <text x="40" y="100" fill="#35d0bb" font-size="14">Warp（例: 32 スレッドの束）</text>
      <rect x="40" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="64" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="88" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="112" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="136" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="160" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="184" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="208" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="232" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="256" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="280" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="304" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="328" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="352" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="376" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="400" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="424" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="448" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="472" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="496" y="120" width="20" height="40" fill="#35d0bb" stroke="#393b38"/>
      <rect x="520" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="544" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="568" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="592" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="616" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="640" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="664" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="688" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="712" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="736" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="760" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
      <rect x="784" y="120" width="20" height="40" fill="#c2c3bf" stroke="#393b38"/>
    <text x="40" y="190" fill="#1e201e">揃っているとき: 全レーンが同じ演算</text>
    <text x="40" y="215" fill="#393b38">分岐で割れたとき: 非活性レーンはマスク（灰色）</text>
    <rect x="40" y="250" width="360" height="130" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="60" y="285" fill="#35d0bb" font-size="14">SIMT</text>
    <text x="60" y="315" fill="#1e201e">スレッド単位で書け、幅は隠れる</text>
    <text x="60" y="340" fill="#393b38">分岐は許されるが効率は落ちる</text>
    <rect x="440" y="250" width="360" height="130" rx="8" fill="#fff" stroke="#393b38"/>
    <text x="460" y="285" fill="#393b38" font-size="14">古典的 SIMD（対照）</text>
    <text x="460" y="315" fill="#1e201e">ベクトル幅がソフトに見える</text>
    <text x="460" y="340" fill="#393b38">発散はプログラマが管理しがち</text>
  </g>

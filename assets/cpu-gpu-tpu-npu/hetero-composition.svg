<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="ヘテロジニアス構成の教育用地図">
  <rect width="900" height="480" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">ヘテロ構成（時間ではない）</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">系譜の木と混ぜない。いまシステムのどこか。</text>
  <g font-family="Georgia, serif" font-size="13">
    <rect x="40" y="90" width="820" height="70" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="60" y="120" fill="#35d0bb" font-weight="600">ソフトウェア生態</text>
    <text x="60" y="142" fill="#1e201e">CUDA / XLA / Core ML / ランタイム・ディスパッチ</text>
    <rect x="40" y="180" width="400" height="240" rx="8" fill="#fff" stroke="#393b38"/>
    <text x="60" y="215" fill="#35d0bb" font-weight="600">データセンター</text>
    <text x="60" y="245" fill="#1e201e">ホスト CPU（制御・OS）</text>
    <text x="60" y="275" fill="#1e201e">＋ GPU アクセラレータ</text>
    <text x="60" y="305" fill="#1e201e">＋ TPU 等の特化 ASIC</text>
    <text x="60" y="345" fill="#393b38">ボトルネック例: 転送・互換・利用率</text>
    <rect x="460" y="180" width="400" height="240" rx="8" fill="#fff" stroke="#393b38"/>
    <text x="480" y="215" fill="#35d0bb" font-weight="600">端末 SoC</text>
    <text x="480" y="245" fill="#1e201e">CPU ＋ GPU ＋ NPU</text>
    <text x="480" y="275" fill="#1e201e">同一ダイ上の予算配分</text>
    <text x="480" y="305" fill="#1e201e">常時オン推論・プライバシー</text>
    <text x="480" y="345" fill="#393b38">ボトルネック例: 電力・熱・API 分断</text>
  </g>
</svg>

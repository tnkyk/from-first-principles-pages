<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="860" height="420" viewBox="0 0 860 420" role="img" aria-label="判断軸 Origin Locus Pressure">
  <rect width="860" height="420" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">新発表の三軸</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">一親に固定しない。起源・位置・圧力で置く。</text>
  <g font-family="Georgia, serif">
    <rect x="40" y="90" width="240" height="220" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="60" y="130" fill="#35d0bb" font-size="16" font-weight="600">起源</text>
    <text x="60" y="165" fill="#1e201e" font-size="13">何の失敗への応答か</text>
    <text x="60" y="195" fill="#393b38" font-size="12">スループット不足？</text>
    <text x="60" y="220" fill="#393b38" font-size="12">行列コスト？</text>
    <text x="60" y="245" fill="#393b38" font-size="12">端末電力？</text>
    <rect x="310" y="90" width="240" height="220" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="330" y="130" fill="#35d0bb" font-size="16" font-weight="600">位置</text>
    <text x="330" y="165" fill="#1e201e" font-size="13">どの層・現場か</text>
    <text x="330" y="195" fill="#393b38" font-size="12">ホスト／アクセラレータ</text>
    <text x="330" y="220" fill="#393b38" font-size="12">端末 SoC／ソフト</text>
    <rect x="580" y="90" width="240" height="220" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="600" y="130" fill="#35d0bb" font-size="16" font-weight="600">圧力</text>
    <text x="600" y="165" fill="#1e201e" font-size="13">何を稼ごうとしているか</text>
    <text x="600" y="195" fill="#393b38" font-size="12">効率／遅延／互換</text>
    <text x="600" y="220" fill="#393b38" font-size="12">電力／尾部遅延</text>
  </g>
  <rect x="40" y="340" width="780" height="50" rx="8" fill="#fff" stroke="#393b38"/>
  <text x="60" y="370" fill="#1e201e" font-family="Georgia, serif" font-size="13">例: 「TOPS 2倍の新 NPU」→ 起源: エッジ予算／位置: 端末 SoC／圧力: 電力</text>
</svg>

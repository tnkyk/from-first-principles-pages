<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="食育の判断軸の模式図">
  <rect width="900" height="420" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">助言を置く三軸（由来／座／圧力）</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">完成した育児方針ではなく、スローガンを仮置きするための座標。</text>
  <g font-family="Georgia, serif" font-size="14">
    <rect x="50" y="100" width="250" height="260" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="70" y="140" fill="#35d0bb" font-weight="600">由来（Origin）</text>
    <text x="70" y="175" fill="#1e201e">生得バイアス</text>
    <text x="70" y="205" fill="#1e201e">発達ネオフォビア</text>
    <text x="70" y="235" fill="#1e201e">学習履歴</text>
    <text x="70" y="265" fill="#1e201e">環境構造</text>
    <text x="70" y="295" fill="#1e201e">臨床境界</text>
    <rect x="325" y="100" width="250" height="260" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="345" y="140" fill="#35d0bb" font-weight="600">座（Locus）</text>
    <text x="345" y="175" fill="#1e201e">子どもの感覚</text>
    <text x="345" y="205" fill="#1e201e">出す側の構造</text>
    <text x="345" y="235" fill="#1e201e">一日リズム</text>
    <text x="345" y="265" fill="#1e201e">家庭と園の差</text>
    <text x="345" y="295" fill="#393b38">どこが不調か</text>
    <rect x="600" y="100" width="250" height="260" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="620" y="140" fill="#35d0bb" font-weight="600">圧力（Pressure）</text>
    <text x="620" y="175" fill="#1e201e">安全学習の不足</text>
    <text x="620" y="205" fill="#1e201e">完食・交渉圧力</text>
    <text x="620" y="235" fill="#1e201e">時間の焦り</text>
    <text x="620" y="265" fill="#1e201e">栄養不安</text>
    <text x="620" y="295" fill="#393b38">今いちばん効いている力</text>
  </g>
</svg>

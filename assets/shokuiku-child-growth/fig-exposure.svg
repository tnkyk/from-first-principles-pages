<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="420" viewBox="0 0 900 420" role="img" aria-label="見る曝露と味わう曝露の分岐図">
  <rect width="900" height="420" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">どんな曝露が好みを動かすか</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">Birch et al. 1987 の対比を教育用に単純化。見る経験と味わう経験は同じではない。</text>
  <g font-family="Georgia, serif" font-size="14">
    <rect x="60" y="100" width="200" height="70" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="95" y="142" fill="#1e201e">新しい食品</text>
    <path d="M260 135 H330" stroke="#393b38" stroke-width="2"/>
    <rect x="330" y="70" width="220" height="90" rx="8" fill="#fff" stroke="#393b38" stroke-width="2"/>
    <text x="360" y="105" fill="#1e201e" font-weight="600">見るだけ</text>
    <text x="360" y="130" fill="#393b38">見た目の好み↑</text>
    <text x="360" y="150" fill="#a9aaa5">味の好みは不足</text>
    <rect x="330" y="200" width="220" height="90" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="360" y="235" fill="#1e201e" font-weight="600">味わう（試食）</text>
    <text x="360" y="260" fill="#393b38">味の好み↑</text>
    <text x="360" y="280" fill="#393b38">学習された安全</text>
    <path d="M330 135 H300 V245 H330" fill="none" stroke="#393b38" stroke-width="2"/>
    <rect x="600" y="120" width="250" height="160" rx="8" fill="#fff" stroke="#393b38"/>
    <text x="620" y="155" fill="#35d0bb" font-weight="600">含意</text>
    <text x="620" y="190" fill="#1e201e">食卓に出すことは必要</text>
    <text x="620" y="220" fill="#1e201e">だが「見た回数」だけでは</text>
    <text x="620" y="250" fill="#1e201e">味の好みは説明しきれない</text>
  </g>
</svg>

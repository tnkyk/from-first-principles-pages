<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="480" viewBox="0 0 900 480" role="img" aria-label="食卓システムの構成図">
  <rect width="900" height="480" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">食卓システムの構成（時間の矢印ではない）</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">拒否を一性格に帰さず、層ごとに点検するための地図。</text>
  <g font-family="Georgia, serif" font-size="14">
    <rect x="60" y="90" width="780" height="70" rx="8" fill="#fff" stroke="#35d0bb" stroke-width="2"/>
    <text x="80" y="120" fill="#1e201e" font-weight="600">一日リズム</text>
    <text x="80" y="145" fill="#393b38">食事回数・間食の時間と量・活動・睡眠・空腹</text>
    <rect x="60" y="190" width="780" height="240" rx="8" fill="#fff" stroke="#393b38" stroke-width="2"/>
    <text x="80" y="225" fill="#1e201e" font-weight="600">食卓イベント</text>
    <rect x="90" y="250" width="220" height="150" rx="6" fill="#f2f3f0" stroke="#35d0bb"/>
    <text x="110" y="285" fill="#1e201e" font-weight="600">養育者層</text>
    <text x="110" y="315" fill="#393b38">何を・いつ・どこで</text>
    <text x="110" y="340" fill="#393b38">出す・同席モデル</text>
    <text x="110" y="365" fill="#393b38">圧力をかけない構造</text>
    <rect x="340" y="250" width="220" height="150" rx="6" fill="#f2f3f0" stroke="#35d0bb"/>
    <text x="360" y="285" fill="#1e201e" font-weight="600">子ども層</text>
    <text x="360" y="315" fill="#393b38">感覚・食欲・自律</text>
    <text x="360" y="340" fill="#393b38">食べるか</text>
    <text x="360" y="365" fill="#393b38">どのくらい食べるか</text>
    <rect x="590" y="250" width="220" height="150" rx="6" fill="#f2f3f0" stroke="#393b38"/>
    <text x="610" y="285" fill="#1e201e" font-weight="600">環境差</text>
    <text x="610" y="315" fill="#393b38">家庭と園</text>
    <text x="610" y="340" fill="#393b38">同席者・品目・雰囲気</text>
    <text x="610" y="365" fill="#393b38">比較は層ごとに</text>
  </g>
</svg>

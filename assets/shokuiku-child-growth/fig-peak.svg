<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="900" height="400" viewBox="0 0 900 400" role="img" aria-label="フードネオフォビアの発達ピークの模式図">
  <rect width="900" height="400" fill="#f2f3f0"/>
  <text x="24" y="36" fill="#1e201e" font-family="Georgia, serif" font-size="20" font-weight="600">フードネオフォビアの強さ（模式）</text>
  <text x="24" y="58" fill="#393b38" font-family="Georgia, serif" font-size="13">厳密な個人曲線ではない。おおよそ2〜6歳にピークが来やすい、という整理。</text>
  <g font-family="Georgia, serif" font-size="13">
    <line x1="80" y1="320" x2="820" y2="320" stroke="#393b38" stroke-width="2"/>
    <line x1="80" y1="100" x2="80" y2="320" stroke="#393b38" stroke-width="2"/>
    <text x="40" y="200" fill="#393b38" transform="rotate(-90 40 200)">警戒の強さ</text>
    <text x="120" y="350" fill="#393b38">乳児</text>
    <text x="300" y="350" fill="#393b38">2歳前後</text>
    <text x="480" y="350" fill="#393b38">幼児後期</text>
    <text x="680" y="350" fill="#393b38">学童以降</text>
    <path d="M100 280 C180 260, 240 140, 340 120 C420 105, 520 150, 620 210 C720 270, 780 280, 800 285" fill="none" stroke="#35d0bb" stroke-width="3"/>
    <circle cx="340" cy="120" r="7" fill="#35d0bb"/>
    <text x="250" y="100" fill="#1e201e" font-weight="600">ピーク帯（個人差大）</text>
    <rect x="500" y="80" width="340" height="90" rx="6" fill="#fff" stroke="#393b38"/>
    <text x="520" y="110" fill="#1e201e">同時に起きやすいこと</text>
    <text x="520" y="135" fill="#393b38">移動・自立・自分で選びたい欲求</text>
    <text x="520" y="155" fill="#393b38">食べ物の見た目カテゴリが厳しくなる</text>
  </g>
</svg>

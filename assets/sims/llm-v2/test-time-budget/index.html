<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>test-time-budget</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .step { font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); margin: 0.2rem 0; }
    .final { color: var(--accent); margin-top: 0.6rem; font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 同じ問題でも思考トークン予算を増やすと探索パスが変わりうる（真偽スイッチではない）</p>
    <div class="panel">
      <div class="mono">問題（玩具）: 15×17+8</div>
      <label class="mono">思考トークン予算 <input id="b" type="range" min="1" max="6" value="2" /></label>
      <div id="trace"></div>
      <div class="final" id="final"></div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="run">考える</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">長いトレースは探索の可視化であり、証明や真偽保証ではありません。</p>
  </div>
  <script>
    const paths = {
      1: { steps: ["直観で 250 くらい"], ans: "250（粗い）" },
      2: { steps: ["15×17=255", "255+8=263"], ans: "263" },
      3: { steps: ["15×10=150", "15×7=105", "150+105=255", "255+8=263"], ans: "263" },
      4: { steps: ["別方針: 15×17=(15×20)-45=300-45=255", "検算: 255+8=263", "もう一度加算確認"], ans: "263" },
      5: { steps: ["255+8", "下一桁 5+8=13", "繰り上がり", "260+3=263", "別表現でも一致"], ans: "263" },
      6: { steps: ["長い自己対話…", "途中で 265 と誤る分岐", "検算で却下", "255+8 に戻る", "確定 263", "（長くても誤り分岐は起きうる）"], ans: "263（長いが保証ではない）" },
    };
    function run() {
      const n = +document.getElementById("b").value;
      const p = paths[n];
      document.getElementById("trace").innerHTML = p.steps.map(s => "<div class='step'>· " + s + "</div>").join("");
      document.getElementById("final").textContent = "出力: " + p.ans + " / 予算=" + n;
    }
    document.getElementById("run").onclick = run;
    document.getElementById("reset").onclick = () => {
      document.getElementById("trace").innerHTML = "";
      document.getElementById("final").textContent = "";
    };
    document.getElementById("b").oninput = run;
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>attention-mix</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    label { display: block; margin: 0.4rem 0; color: var(--ink-dim); font-size: 12px; }
    input[type=range] { width: 100%; }
    .out { margin-top: 0.75rem; font-family: var(--font-mono); color: var(--accent); }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 出力は value の加重平均であり、重みは query-key 類似度から来る</p>
    <div class="panel">
      <div>トークン: 猫 / が / 走る</div>
      <label>「走る」位置の query が「猫」に似ている度 <input id="w0" type="range" min="0" max="100" value="70" /></label>
      <label>「が」に似ている度 <input id="w1" type="range" min="0" max="100" value="10" /></label>
      <label>「走る」自身 <input id="w2" type="range" min="0" max="100" value="20" /></label>
      <div class="out" id="out"></div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="mix">混ぜる</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">価値ベクトルを色の RGB に見立てた玩具です。</p>
  </div>
  <script>
    const V = [[220,80,80],[80,180,120],[80,140,220]];
    const labels = ["猫","が","走る"];
    const out = document.getElementById("out");
    function mix() {
      let w = [+w0.value, +w1.value, +w2.value];
      const s = w.reduce((a,b)=>a+b,0) || 1;
      w = w.map(x => x/s);
      const rgb = [0,0,0];
      for (let i=0;i<3;i++) for (let c=0;c<3;c++) rgb[c] += w[i]*V[i][c];
      out.innerHTML = "重み: " + w.map((x,i)=>labels[i]+"=" + x.toFixed(2)).join(" / ") +
        "<br>混ぜた出力 RGB ≈ (" + rgb.map(x=>Math.round(x)).join(", ") + ")";
    }
    document.getElementById("mix").onclick = mix;
    document.getElementById("reset").onclick = () => {
      w0.value=70; w1.value=10; w2.value=20; mix();
    };
    mix();
  </script>
</body>
</html>

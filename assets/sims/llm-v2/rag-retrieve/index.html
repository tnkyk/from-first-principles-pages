<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>rag-retrieve</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .doc { border: 1px solid var(--ink-line); border-radius: 3px; padding: 0.5rem; margin: 0.35rem 0; font-family: var(--font-mono); font-size: 12px; }
    .doc.on { border-color: var(--accent); color: var(--accent); }
    .ans { margin-top: 0.75rem; color: var(--accent); font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 回答は取得文書に条件付けされ、文書が変わると出力分布が変わる</p>
    <div class="panel">
      <div class="mono">質問: 首都は？</div>
      <div id="docs"></div>
      <div class="ans" id="ans"></div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="a">文書セット A</button>
      <button type="button" id="b">文書セット B</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">玩具 RAG。検索結果が条件に入るだけで、真偽保証ではありません。</p>
  </div>
  <script>
    const A = ["東京は日本の首都である。", "大阪は商業都市である。"];
    const B = ["京都は古都として知られる。", "名古屋は産業の中心の一つである。"];
    const docs = document.getElementById("docs");
    const ans = document.getElementById("ans");
    function show(set, label) {
      docs.innerHTML = set.map(t => "<div class='doc on'>" + t + "</div>").join("");
      ans.textContent = label === "A"
        ? "条件付き出力（玩具）: 「首都は東京」— 文書Aに依存"
        : "条件付き出力（玩具）: 「首都は…不明瞭」— 文書Bに『首都』事実が無い";
    }
    document.getElementById("a").onclick = () => show(A, "A");
    document.getElementById("b").onclick = () => show(B, "B");
    document.getElementById("reset").onclick = () => { docs.innerHTML = ""; ans.textContent = "文書セットを選んでください"; };
    document.getElementById("reset").onclick();
  </script>
</body>
</html>

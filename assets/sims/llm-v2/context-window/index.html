<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>context-window</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .tok { display: inline-block; margin: 0.15rem; padding: 0.2rem 0.4rem; border-radius: 3px; font-family: var(--font-mono); font-size: 12px; border: 1px solid var(--ink-line); }
    .tok.in { border-color: var(--accent); color: var(--accent); }
    .tok.out { opacity: 0.35; text-decoration: line-through; }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 窓を超えた接頭辞は条件に入れられず、後段の予測から消える</p>
    <div class="panel" id="stage"></div>
    <div class="sim-row">
      <label class="mono">窓サイズ <input id="win" type="range" min="3" max="8" value="5" /></label>
      <button type="button" class="primary" id="push">トークンを追加</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint" id="hint"></p>
  </div>
  <script>
    let seq = ["名前は青", "予算は低", "形式は表", "質問A", "質問B"];
    const pool = ["追記1","追記2","追記3","追記4","追記5","追記6"];
    let pi = 0;
    const stage = document.getElementById("stage");
    const hint = document.getElementById("hint");
    function render() {
      const W = +document.getElementById("win").value;
      const start = Math.max(0, seq.length - W);
      let html = "";
      seq.forEach((t,i) => {
        const inside = i >= start;
        html += "<span class='tok " + (inside ? "in" : "out") + "'>" + t + "</span>";
      });
      const dropped = seq.slice(0, start);
      hint.textContent = dropped.length
        ? "窓の外（条件から消える）: " + dropped.join(" / ")
        : "すべて窓内に収まっています。";
      stage.innerHTML = html + "<div class='mono' style='margin-top:0.6rem;color:var(--ink-dim)'>窓=" + W + " / 列長=" + seq.length + "</div>";
    }
    document.getElementById("push").onclick = () => {
      if (pi < pool.length) seq.push(pool[pi++]);
      render();
    };
    document.getElementById("reset").onclick = () => {
      seq = ["名前は青", "予算は低", "形式は表", "質問A", "質問B"];
      pi = 0; render();
    };
    document.getElementById("win").oninput = render;
    render();
  </script>
</body>
</html>

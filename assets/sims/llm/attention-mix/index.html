<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>注意の混合</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .grid { display: grid; gap: 0.5rem; }
    .tok { display: flex; align-items: center; gap: 0.5rem; }
    .tok label { width: 5.5rem; color: var(--ink-dim); font-family: var(--font-mono); font-size: 12px; }
    input[type="range"] { flex: 1; }
    .bar { height: 10px; border-radius: 2px; background: var(--ink-line); overflow: hidden; flex: 1; }
    .bar > i { display: block; height: 100%; background: var(--accent); width: 0%; }
    .out { font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); margin-top: 0.5rem; white-space: pre-wrap; }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 自己注意は、トークン表現を文脈内の値ベクトルの類似度つき加重平均で置き換える。</p>
    <div class="panel grid" id="stage">
      <p style="margin:0;color:var(--ink-dim);font-size:12px;">クエリ位置「静かに」— スライダーで重みを動かし、混合結果がどう動くかを見る。</p>
      <div class="tok"><label>それ [1,0]</label><input id="w0" type="range" min="0" max="100" value="10" /><div class="bar"><i id="b0"></i></div></div>
      <div class="tok"><label>座った [0,1]</label><input id="w1" type="range" min="0" max="100" value="20" /><div class="bar"><i id="b1"></i></div></div>
      <div class="tok"><label>静かに [1,1]</label><input id="w2" type="range" min="0" max="100" value="70" /><div class="bar"><i id="b2"></i></div></div>
      <div class="out" id="out"></div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="act">正規化して混合</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">教育用玩具 — 1つの対比だけ。知識グラフのポインタではない。</p>
  </div>
  <script>
    const vals = [[1, 0], [0, 1], [1, 1]];
    const inputs = [w0, w1, w2];
    const bars = [b0, b1, b2];
    const defaults = [10, 20, 70];
    function mix() {
      let raw = inputs.map((el) => Number(el.value));
      const s = raw.reduce((a, b) => a + b, 0) || 1;
      const a = raw.map((x) => x / s);
      bars.forEach((b, i) => { b.style.width = (a[i] * 100).toFixed(1) + "%"; });
      const out = [0, 0];
      for (let i = 0; i < 3; i++) {
        out[0] += a[i] * vals[i][0];
        out[1] += a[i] * vals[i][1];
      }
      document.getElementById("out").textContent =
        "重み α = [" + a.map((x) => x.toFixed(2)).join(", ") + "]\n" +
        "混合後の値 = [" + out.map((x) => x.toFixed(2)).join(", ") + "]\n" +
        "ソフトな混合であり、1トークンへの硬い参照ではない。";
    }
    document.getElementById("act").onclick = mix;
    document.getElementById("reset").onclick = () => {
      inputs.forEach((el, i) => { el.value = defaults[i]; });
      mix();
    };
    inputs.forEach((el) => el.addEventListener("input", mix));
    mix();
  </script>
</body>
</html>

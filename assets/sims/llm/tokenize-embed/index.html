<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>トークン化パイプライン</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .steps { display: grid; gap: 0.5rem; margin-top: 0.5rem; }
    .step { border: 1px solid var(--ink-line); border-radius: 4px; padding: 0.5rem 0.65rem; background: var(--code-bg); }
    .step .lab { color: var(--ink-faint); font-size: 11px; font-family: var(--font-sans); margin-bottom: 0.2rem; }
    .step .val { font-family: var(--font-mono); font-size: 12px; color: var(--ink); word-break: break-all; }
    .step.active { border-color: var(--accent); }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 言語は「思考」として入るのではなく、語彙片→整数ID→埋め込み参照の列として入る。</p>
    <div class="panel" id="stage">
      <label class="mono" style="color:var(--ink-dim);font-size:12px;">入力</label>
      <input id="text" value="猫が座った" style="width:100%;margin-top:0.35rem;background:var(--page);color:var(--ink);border:1px solid var(--ink-line);border-radius:3px;padding:0.4rem 0.5rem;font:inherit;" />
      <div class="steps" id="steps"></div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="act">1ステップ進める</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">教育用玩具 — 対比を1つだけ示す。実際のBPE分割とは限らない。</p>
  </div>
  <script>
    const vocab = {
      "猫": 812, "が": 15, "座": 904, "った": 77, "た": 41,
      "The": 464, " cat": 3797, " sat": 3331, " ": 220
    };
    let phase = 0;
    const textEl = document.getElementById("text");
    const steps = document.getElementById("steps");

    function naiveTok(s) {
      // tiny demo tokenizer: prefer longer known pieces
      const keys = Object.keys(vocab).sort((a, b) => b.length - a.length);
      const out = [];
      let i = 0;
      while (i < s.length) {
        let hit = null;
        for (const k of keys) {
          if (s.startsWith(k, i)) { hit = k; break; }
        }
        if (!hit) { out.push(s[i]); i += 1; }
        else { out.push(hit); i += hit.length; }
      }
      return out;
    }

    function render() {
      const s = textEl.value || "";
      const toks = naiveTok(s);
      const ids = toks.map((t) => vocab[t] ?? ("?" + t.charCodeAt(0)));
      const vecs = ids.map((id) => {
        if (typeof id !== "number") return "[?, ?, ?]";
        const a = ((id * 17) % 100) / 100;
        const b = ((id * 31) % 100) / 100 - 0.5;
        const c = ((id * 13) % 100) / 100;
        return "[" + a.toFixed(2) + ", " + b.toFixed(2) + ", " + c.toFixed(2) + "]";
      });
      const blocks = [
        { lab: "0 入力文字列", val: JSON.stringify(s) },
        { lab: "1 トークン片（語彙の部品）", val: toks.map((t) => "「" + t + "」").join(" ") },
        { lab: "2 整数ID（モデルが見る列）", val: "[" + ids.join(", ") + "]" },
        { lab: "3 埋め込み参照 E[id]（行を取り出す）", val: vecs.join("  ") },
      ];
      steps.innerHTML = "";
      blocks.forEach((b, i) => {
        const d = document.createElement("div");
        d.className = "step" + (i === phase ? " active" : "");
        d.innerHTML = '<div class="lab">' + b.lab + "</div><div class=\"val\">" +
          (i <= phase ? b.val : "…") + "</div>";
        steps.appendChild(d);
      });
    }
    document.getElementById("act").onclick = () => { phase = Math.min(3, phase + 1); render(); };
    document.getElementById("reset").onclick = () => { phase = 0; render(); };
    textEl.addEventListener("input", () => { phase = 0; render(); });
    render();
  </script>
</body>
</html>

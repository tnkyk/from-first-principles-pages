<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>有限コンテキスト窓</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .track { display: flex; gap: 3px; flex-wrap: wrap; margin-top: 0.55rem; }
    .tok { font-family: var(--font-mono); font-size: 11px; padding: 0.25rem 0.35rem; border-radius: 3px; border: 1px solid var(--ink-line); color: var(--ink-dim); }
    .tok.in { border-color: var(--accent); color: var(--ink); background: var(--accent-soft); }
    .tok.out { opacity: 0.35; text-decoration: line-through; }
    .out { margin-top: 0.65rem; font-size: 12px; color: var(--ink-dim); font-family: var(--font-mono); }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 自己注意が混ぜられるのは有限長のトークン列だけ。窓から落ちた先頭指示は、不服従ではなく不在である。</p>
    <div class="panel" id="stage">
      <label class="mono" style="color:var(--ink-dim);font-size:12px;">窓の長さ = <span id="wlabel">8</span> トークン</label>
      <input id="win" type="range" min="4" max="16" step="1" value="8" style="width:100%;margin-top:0.35rem;" />
      <div class="track" id="track"></div>
      <div class="out" id="out"></div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="act">貼り付けを長くする</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">教育用玩具 — 製品の要約メモリとは別物。コアの混合器は有限リストだけを見る。</p>
  </div>
  <script>
    const base = ["【指示:必ず箇条書き】", "質問:", "天気は", "どう", "ですか", "？", "追記1", "追記2", "追記3", "追記4", "追記5", "追記6", "追記7", "追記8", "追記9", "末尾"];
    let extra = 0;
    const win = document.getElementById("win");
    const track = document.getElementById("track");
    const out = document.getElementById("out");
    const wlabel = document.getElementById("wlabel");

    function render() {
      const W = Number(win.value);
      wlabel.textContent = String(W);
      const tokens = base.slice(0, 6 + extra);
      const start = Math.max(0, tokens.length - W);
      track.innerHTML = "";
      tokens.forEach((t, i) => {
        const el = document.createElement("span");
        el.className = "tok " + (i >= start ? "in" : "out");
        el.textContent = t;
        track.appendChild(el);
      });
      const dropped = tokens.slice(0, start);
      const hasInstr = dropped.some((t) => t.includes("指示"));
      out.textContent = hasInstr
        ? "先頭の【指示】が窓の外に落ちた。モデルは不服従ではなく、そのトークンを見ていない。"
        : "今は指示が窓の中にある。貼り付けを伸ばすか窓を縮めると消える。";
    }
    document.getElementById("act").onclick = () => { extra = Math.min(10, extra + 1); render(); };
    document.getElementById("reset").onclick = () => { extra = 0; win.value = 8; render(); };
    win.addEventListener("input", render);
    render();
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>次トークン予測</title>
  <link rel="stylesheet" href="../../../sim-kit.css" />
  <style>
    .row { display: flex; gap: 0.5rem; align-items: flex-end; height: 130px; margin-top: 0.5rem; }
    .col { flex: 1; display: flex; flex-direction: column; justify-content: flex-end; align-items: center; gap: 0.2rem; height: 100%; }
    .stem { width: 100%; background: var(--accent); border-radius: 2px 2px 0 0; }
    .col span { font-family: var(--font-mono); font-size: 11px; color: var(--ink-dim); }
    .out { margin-top: 0.6rem; font-family: var(--font-mono); font-size: 12px; color: var(--ink-dim); }
  </style>
</head>
<body>
  <div class="sim">
    <p class="sim-claim"><strong>主張:</strong> 学習が押しつける技能は、左文脈からの次トークン予測であり、世界の真偽スコアではない。</p>
    <div class="panel" id="stage">
      <p style="margin:0;color:var(--ink-dim);font-size:12px;">文脈: <span class="mono" id="ctx">猫が座ったあとに続くのは</span></p>
      <div class="row" id="bars"></div>
      <div class="out" id="out">正しい続きが「マット」なら、その確率への交差エントロピーが損失になる。</div>
    </div>
    <div class="sim-row">
      <button type="button" class="primary" id="act">1ステップ学習（正しいIDへ寄せる）</button>
      <button type="button" id="reset">リセット</button>
    </div>
    <p class="hint">教育用玩具 — 分布が「正しさ」ではなく「コーパスらしい続き」に寄る様子だけを示す。</p>
  </div>
  <script>
    const labels = ["マット", "床", "雲", "論文"];
    let logits = [1.2, 0.8, -0.5, 0.2];
    const target = 0;
    const bars = document.getElementById("bars");
    const out = document.getElementById("out");

    function softmax(z) {
      const m = Math.max(...z);
      const e = z.map((x) => Math.exp(x - m));
      const s = e.reduce((a, b) => a + b, 0);
      return e.map((x) => x / s);
    }
    function render() {
      const p = softmax(logits);
      bars.innerHTML = "";
      p.forEach((pi, i) => {
        const col = document.createElement("div");
        col.className = "col";
        const stem = document.createElement("div");
        stem.className = "stem";
        stem.style.height = Math.max(3, pi * 110) + "px";
        if (i === target) stem.style.outline = "1px solid var(--accent)";
        col.appendChild(stem);
        const lab = document.createElement("span");
        lab.textContent = labels[i];
        const pct = document.createElement("span");
        pct.textContent = (pi * 100).toFixed(0) + "%";
        col.appendChild(lab);
        col.appendChild(pct);
        bars.appendChild(col);
      });
      const loss = (-Math.log(p[target])).toFixed(2);
      out.textContent = "p(正しい続き)=" + (p[target] * 100).toFixed(1) + "% / 損失 ≈ " + loss +
        " — 「雲」「論文」が高くても、それは真偽ではなく局所的らしさ。";
    }
    document.getElementById("act").onclick = () => {
      logits = logits.map((z, i) => i === target ? z + 0.55 : z - 0.15);
      render();
    };
    document.getElementById("reset").onclick = () => { logits = [1.2, 0.8, -0.5, 0.2]; render(); };
    render();
  </script>
</body>
</html>

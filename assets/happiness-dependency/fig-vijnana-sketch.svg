<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="720" height="280" viewBox="0 0 720 280" role="img" aria-label="yuishiki">
  <rect width="720" height="280" fill="#1e201e"/>
  <text x="24" y="36" fill="#f2f3f0" font-family="Georgia, serif" font-size="18" font-weight="600">唯識・三能変（教育用スケッチ）</text>
  <rect x="40" y="70" width="200" height="100" rx="4" fill="#151716" stroke="#35d0bb" stroke-width="2"/>
  <text x="60" y="105" fill="#f2f3f0" font-family="Georgia, serif" font-size="15">異熟・阿頼耶</text>
  <text x="60" y="130" fill="#a9aaa5" font-family="Georgia, serif" font-size="13">種子を蔵する流れ</text>
  <text x="60" y="152" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">潜在傾向の相続</text>
  <rect x="260" y="70" width="200" height="100" rx="4" fill="#151716" stroke="#35d0bb" stroke-width="2"/>
  <text x="280" y="105" fill="#f2f3f0" font-family="Georgia, serif" font-size="15">思量・末那</text>
  <text x="280" y="130" fill="#a9aaa5" font-family="Georgia, serif" font-size="13">恒に「私」と審く</text>
  <text x="280" y="152" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">我執の様式</text>
  <rect x="480" y="70" width="200" height="100" rx="4" fill="#151716" stroke="#393b38" stroke-width="2"/>
  <text x="500" y="105" fill="#f2f3f0" font-family="Georgia, serif" font-size="15">了別境・六識</text>
  <text x="500" y="130" fill="#a9aaa5" font-family="Georgia, serif" font-size="13">いまの対象を知る</text>
  <text x="500" y="152" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">見聞き考え</text>
  <path d="M240 120 H260" stroke="#c2c3bf" stroke-width="2"/>
  <path d="M460 120 H480" stroke="#c2c3bf" stroke-width="2"/>
  <text x="24" y="210" fill="#f2f3f0" font-family="Georgia, serif" font-size="14">現行が熏習し、種子が再び現行を支える（独我論ではない因果モデル）</text>
  <text x="24" y="250" fill="#a9aaa5" font-family="Georgia, serif" font-size="12">教育用模式図 / 唯識三十頌・成唯識論（近似）</text>
</svg>
